<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0f172a"/>

  <!-- Radar rings -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#22c55e" stroke-width="0.8" opacity="0.35"/>
  <circle cx="16" cy="16" r="8.5" fill="none" stroke="#22c55e" stroke-width="0.8" opacity="0.45"/>
  <circle cx="16" cy="16" r="4" fill="none" stroke="#22c55e" stroke-width="0.8" opacity="0.55"/>

  <!-- Crosshair lines (with gap at center) -->
  <line x1="3" y1="16" x2="12" y2="16" stroke="#22c55e" stroke-width="0.9" stroke-linecap="round" opacity="0.7"/>
  <line x1="20" y1="16" x2="29" y2="16" stroke="#22c55e" stroke-width="0.9" stroke-linecap="round" opacity="0.7"/>
  <line x1="16" y1="3" x2="16" y2="12" stroke="#22c55e" stroke-width="0.9" stroke-linecap="round" opacity="0.7"/>
  <line x1="16" y1="20" x2="16" y2="29" stroke="#22c55e" stroke-width="0.9" stroke-linecap="round" opacity="0.7"/>

  <!-- Radar sweep (45° sector, fading gradient effect via two lines) -->
  <line x1="16" y1="16" x2="27" y2="5" stroke="#22c55e" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>

  <!-- Blip on the sweep edge -->
  <circle cx="23.5" cy="8.5" r="1.5" fill="#22c55e" opacity="0.95"/>

  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.5" fill="#22c55e"/>
</svg>
